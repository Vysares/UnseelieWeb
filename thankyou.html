<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Received - Unseelie Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/cart.css">
    <style>
        body {
            background-color: #1a1f1e;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.019) 2px, rgba(0,0,0,.019) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.019) 2px, rgba(0,0,0,.019) 4px),
                linear-gradient(135deg, #1a1f1e 0%, #1e2528 50%, #1d1a23 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thankyou-wrap {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 560px;
        }

        .thankyou-glyph {
            font-size: 3rem;
            margin-bottom: 2rem;
            display: block;
            opacity: 0.8;
        }

        .thankyou-heading {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.5rem;
            font-weight: 300;
            font-style: italic;
            color: var(--gold);
            margin-bottom: 1.25rem;
            line-height: 1.1;
        }

        .thankyou-message {
            color: rgba(245, 241, 232, 0.75);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="thankyou-wrap">
        <span class="thankyou-glyph">✦</span>
        <h1 class="thankyou-heading">Order Confirmed!</h1>
        <p class="thankyou-message">
            Your payment was successful.<br>
            You'll receive a confirmation email shortly.
        </p>
        <a href="index.html" class="btn-secondary">Go Back</a>
    </div>
    <script src="js/grain.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
